<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Explorer — Roasted Coffee Tracker</title>
<style>
  :root {
    --bg: #faf6f1;
    --surface: #fff;
    --border: #e0d5c7;
    --text: #3b2f2f;
    --text-muted: #7a6a5a;
    --accent: #8b5e3c;
    --accent-light: #c49a6c;
    --highlight: #f5ebe0;
    --row-hover: #fdf2e9;
    --selected: #f0e0cc;
    --gold: #b8860b;
    --gold-bg: #fdf8ef;
    --gold-border: #e8d5a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
  }

  header h1 { font-size: 1.4rem; font-weight: 600; white-space: nowrap; }

  .nav-tabs {
    display: flex; align-items: flex-end; gap: 0.4rem; flex-wrap: wrap;
  }
  .nav-group {
    display: flex; flex-direction: column; align-items: center; gap: 0.1rem;
  }
  .nav-group-label {
    font-size: 0.6rem; font-style: italic; opacity: 0.6;
    letter-spacing: 0.03em;
  }
  .nav-group-tabs { display: flex; gap: 0.25rem; }
  .nav-link {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    white-space: nowrap;
  }
  .nav-link:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-link.active {
    background: rgba(255,255,255,0.25); color: #fff;
    border-color: rgba(255,255,255,0.6); font-weight: 600;
  }

  #search {
    flex: 1; min-width: 200px; max-width: 400px;
    padding: 0.5rem 0.75rem; border: none; border-radius: 6px;
    font-size: 0.95rem; background: rgba(255,255,255,0.9); color: var(--text);
  }
  #search::placeholder { color: var(--text-muted); }

  .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .filter-group select {
    padding: 0.4rem 0.5rem; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px; background: rgba(255,255,255,0.15); color: #fff;
    font-size: 0.8rem; cursor: pointer;
  }
  .filter-group select option { color: var(--text); background: var(--surface); }

  #stats { font-size: 0.85rem; opacity: 0.85; white-space: nowrap; }

  main { max-width: 1400px; margin: 0 auto; padding: 1rem; }

  /* --- Availability --- */
  .unavailable { opacity: 0.5; }
  .sold-out-badge {
    display: inline-block; font-size: 0.6rem; font-weight: 700;
    padding: 0.1rem 0.3rem; border-radius: 3px;
    background: #d9534f; color: #fff; text-transform: uppercase;
    vertical-align: middle; margin-left: 0.3rem;
  }

  /* --- Watchlist Section --- */
  #watchlist-section { margin-bottom: 1.5rem; }
  #watchlist-section h2 {
    font-size: 1.1rem; color: var(--accent); margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  #watchlist-count { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }

  .watchlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0.75rem;
  }

  .watchlist-card {
    background: var(--gold-bg); border: 1px solid var(--gold-border);
    border-radius: 8px; padding: 0.85rem; cursor: pointer;
    transition: box-shadow 0.25s, transform 0.15s, border-color 0.25s;
    display: flex; gap: 0.75rem; flex-wrap: wrap;
  }
  .watchlist-card:hover {
    box-shadow: 0 2px 8px rgba(139, 94, 60, 0.15);
    transform: translateY(-1px);
  }
  .watchlist-card.expanded {
    grid-column: 1 / -1;
    border-color: var(--accent-light);
    box-shadow: 0 4px 16px rgba(139, 94, 60, 0.2);
    transform: none;
  }

  .wc-img {
    width: 72px; height: 72px; border-radius: 6px;
    object-fit: cover; border: 1px solid var(--gold-border);
    flex-shrink: 0; background: var(--highlight);
  }

  .wc-body { flex: 1; min-width: 0; }

  .wc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.3rem; }
  .wc-top h3 { font-size: 0.9rem; color: var(--text); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; }

  .wc-price-block { text-align: right; flex-shrink: 0; margin-left: 0.5rem; }
  .wc-price { font-weight: 600; color: var(--accent); font-size: 0.9rem; }
  .wc-peroz { font-size: 0.7rem; color: var(--text-muted); }
  .wc-sample { font-size: 0.7rem; color: var(--text-muted); }

  .wc-mid { margin-bottom: 0.3rem; display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; }
  .roaster-badge { font-size: 0.75rem; color: var(--text-muted); }

  .tier-badge {
    display: inline-block; font-size: 0.65rem; font-weight: 600;
    padding: 0.1rem 0.35rem; border-radius: 3px; white-space: nowrap;
  }
  .tier-legend { background: #ffd700; color: #5a4700; }
  .tier-coe-legend { background: #e8c547; color: #5a4700; }
  .tier-wbc { background: #d4a574; color: #4a3520; }
  .tier-coe { background: #c9b896; color: #4a3520; }
  .tier-elite { background: #a8c4a0; color: #2d4a28; }
  .tier-default { background: var(--border); color: var(--text-muted); }

  .wc-producer { font-size: 0.82rem; color: var(--accent); margin-bottom: 0.2rem; }
  .wc-accolade { font-size: 0.72rem; color: var(--text-muted); font-style: italic; margin-bottom: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wc-meta { font-size: 0.78rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 0.2rem 0.6rem; }
  .wc-detail {
    width: 100%; flex-basis: 100%;
    border-top: 1px solid var(--gold-border); padding-top: 0.75rem; margin-top: 0.5rem;
    animation: detailSlideIn 0.25s ease-out;
  }
  @keyframes detailSlideIn {
    from { opacity: 0; max-height: 0; padding-top: 0; margin-top: 0; }
    to { opacity: 1; max-height: 800px; padding-top: 0.75rem; margin-top: 0.5rem; }
  }

  /* --- Table --- */
  #table-section h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 0.75rem; }
  #table-container {
    overflow-x: auto; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--border);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  thead th {
    position: sticky; top: 0; background: var(--highlight);
    border-bottom: 2px solid var(--border); padding: 0.6rem 0.75rem;
    text-align: left; cursor: pointer; user-select: none;
    white-space: nowrap; font-weight: 600; color: var(--accent);
  }
  thead th:hover { background: var(--selected); }
  thead th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.selected { background: var(--selected); }
  tbody tr.watchlist-row { background: var(--gold-bg); }
  tbody tr.watchlist-row:hover { background: #f5ecd8; }
  tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  td { padding: 0.5rem 0.75rem; white-space: nowrap; }
  td.wrap { white-space: normal; max-width: 300px; }
  td .tbl-img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: 0.4rem; }

  /* --- Inline Detail Row --- */
  .detail-row td {
    padding: 0; border-bottom: 2px solid var(--accent-light) !important;
  }
  .detail-inner {
    padding: 1rem 1.25rem; background: var(--highlight);
    word-wrap: break-word; overflow-wrap: break-word;
    animation: detailSlideIn 0.25s ease-out;
  }
  .detail-top { display: flex; gap: 1.25rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .detail-img {
    width: 140px; height: 140px; border-radius: 8px;
    border: 1px solid var(--border); object-fit: cover; background: var(--surface);
    flex-shrink: 0;
  }
  .detail-header { flex: 1; min-width: 200px; }
  .detail-header h3 { font-size: 1.05rem; color: var(--accent); margin-bottom: 0.2rem; word-wrap: break-word; }
  .detail-header a { color: var(--accent); text-decoration: none; font-size: 0.82rem; }
  .detail-header a:hover { text-decoration: underline; }
  .detail-accolade { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-top: 0.35rem; line-height: 1.5; }
  .detail-specs {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.4rem 1.25rem; margin-bottom: 0.75rem; font-size: 0.84rem;
  }
  .spec-item { display: flex; gap: 0.4rem; }
  .spec-label { font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .spec-value { color: var(--text); }
  .notes-section { margin-bottom: 0.5rem; }
  .notes-section h3 { font-size: 0.85rem; color: var(--accent); margin-bottom: 0.25rem; }
  .notes-section p { font-size: 0.84rem; color: var(--text); line-height: 1.5; }

  #loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 1.1rem; }

  @media (max-width: 768px) {
    header { flex-direction: column; align-items: stretch; }
    #search { max-width: none; }
    .watchlist-grid { grid-template-columns: 1fr; }
    #detail-specs { grid-template-columns: 1fr; }
    td { font-size: 0.8rem; padding: 0.4rem 0.5rem; }
    .wc-img { width: 56px; height: 56px; }
  }
</style>
</head>
<body>

<header>
  <h1>Coffee Explorer</h1>
  <nav class="nav-tabs">
    <a class="nav-link active">Roasted</a>
    <div class="nav-group">
      <span class="nav-group-label">green coffee</span>
      <div class="nav-group-tabs">
        <a class="nav-link" href="https://cyrusmaher.github.io/green-coffee-explorer/">Sweet Maria's</a>
        <a class="nav-link" href="https://cyrusmaher.github.io/green-coffee-explorer/hacea.html">Hacea</a>
        <a class="nav-link" href="https://cyrusmaher.github.io/green-coffee-explorer/cbc.html">CBC</a>
      </div>
    </div>
  </nav>
  <input type="text" id="search" placeholder="Search coffees (e.g. &quot;Geisha&quot;, &quot;Ethiopia&quot;, &quot;natural&quot;)...">
  <div class="filter-group">
    <select id="filter-roaster"><option value="">All Roasters</option></select>
    <select id="filter-country"><option value="">All Countries</option></select>
    <select id="filter-tier"><option value="">All Tiers</option></select>
  </div>
  <span id="stats"></span>
</header>

<main>
  <div id="loading">Loading roasted coffee data...</div>

  <section id="watchlist-section" style="display:none">
    <h2>Watchlist Matches <span id="watchlist-count"></span></h2>
    <div id="watchlist-grid" class="watchlist-grid"></div>
  </section>

  <section id="table-section" style="display:none">
    <h2>All Roasted Coffees</h2>
    <div id="table-container">
      <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script>
/* ---------- Config ---------- */
const TABLE_COLS = [
  { key: "title",            label: "Name",     wrap: true, img: true },
  { key: "roaster_name",     label: "Roaster" },
  { key: "producer_or_farm", label: "Producer",  wrap: true },
  { key: "origin_country",   label: "Country" },
  { key: "process",          label: "Process" },
  { key: "variety_str",      label: "Variety",   wrap: true },
  { key: "price",            label: "Price",     sort: "price" },
  { key: "price_per_oz",     label: "$/oz",      sort: "price" },
  { key: "sample",           label: "Sample",   sort: "sample_price" },
];

const TIER_ORDER = {
  "Legend": 0, "CoE Legend": 1, "WBC Elite": 2, "WBC/CoE": 3,
  "CoE Repeat": 4, "BoP Winner": 5, "CoE Winner": 6,
  "Yemen Elite": 7, "Yemen Rising": 8,
  "Ethiopia Elite": 9, "Ethiopia CoE": 10, "Ethiopia Notable": 11,
  "Tanzania Elite": 12, "Burundi Elite": 13, "Burundi CoE": 14,
  "Rwanda CoE": 15, "Rwanda Notable": 16,
  "Kenya Elite": 17, "Kenya Notable": 18,
  "Bolivia Elite": 19, "Indonesia Elite": 20, "Indonesia CoE": 21,
  "Thailand CoE": 22, "Taiwan CoE": 23,
};

/* ---------- Reference Links ---------- */
// WCR = verified in World Coffee Research catalog; Wiki = verified Wikipedia page
const VARIETY_LINKS = {
  // WCR catalog (verified)
  "Geisha": "https://varieties.worldcoffeeresearch.org/varieties/geisha-panama",
  "Gesha": "https://varieties.worldcoffeeresearch.org/varieties/geisha-panama",
  "Green Tip Geisha": "https://varieties.worldcoffeeresearch.org/varieties/geisha-panama",
  "Gori Geisha": "https://varieties.worldcoffeeresearch.org/varieties/geisha-panama",
  "Bourbon": "https://varieties.worldcoffeeresearch.org/varieties/bourbon",
  "Pink Bourbon": "https://varieties.worldcoffeeresearch.org/varieties/bourbon",
  "Red Bourbon": "https://varieties.worldcoffeeresearch.org/varieties/bourbon",
  "Yellow Bourbon": "https://varieties.worldcoffeeresearch.org/varieties/bourbon",
  "Orange Bourbon": "https://varieties.worldcoffeeresearch.org/varieties/bourbon",
  "Striped Bourbon": "https://varieties.worldcoffeeresearch.org/varieties/bourbon",
  "Typica": "https://varieties.worldcoffeeresearch.org/varieties/typica",
  "Caturra": "https://varieties.worldcoffeeresearch.org/varieties/caturra",
  "Purple Caturra": "https://varieties.worldcoffeeresearch.org/varieties/caturra",
  "Yellow Caturra": "https://varieties.worldcoffeeresearch.org/varieties/caturra",
  "Catuai": "https://varieties.worldcoffeeresearch.org/varieties/catuai",
  "Catuaí": "https://varieties.worldcoffeeresearch.org/varieties/catuai",
  "SL-28": "https://varieties.worldcoffeeresearch.org/varieties/sl28",
  "SL-34": "https://varieties.worldcoffeeresearch.org/varieties/sl34",
  "Pacamara": "https://varieties.worldcoffeeresearch.org/varieties/pacamara",
  "Yellow Pacamara": "https://varieties.worldcoffeeresearch.org/varieties/pacamara",
  "Pacas": "https://varieties.worldcoffeeresearch.org/varieties/pacas",
  "Java": "https://varieties.worldcoffeeresearch.org/varieties/java",
  "K7": "https://varieties.worldcoffeeresearch.org/varieties/k7",
  "Batian": "https://varieties.worldcoffeeresearch.org/varieties/batian",
  "Ruiru 11": "https://varieties.worldcoffeeresearch.org/varieties/ruiru-11",
  "Ruiru11": "https://varieties.worldcoffeeresearch.org/varieties/ruiru-11",
  "Parainema": "https://varieties.worldcoffeeresearch.org/varieties/parainema",
  "Milenio": "https://varieties.worldcoffeeresearch.org/varieties/milenio",
  "Maragogype": "https://varieties.worldcoffeeresearch.org/varieties/maragogipe",
  "Mundo Novo": "https://varieties.worldcoffeeresearch.org/varieties/mundo-novo",
  "Jackson": "https://varieties.worldcoffeeresearch.org/varieties/jackson-2-1257",
  "Catimor": "https://varieties.worldcoffeeresearch.org/varieties/catimor-129",
  // Wikipedia (verified substantive pages)
  "Maracaturra": "https://en.wikipedia.org/wiki/Maracaturra_coffee",
  "Blue Mountain": "https://en.wikipedia.org/wiki/Jamaican_Blue_Mountain_Coffee",
  "Excelsa": "https://en.wikipedia.org/wiki/Coffea_liberica",
  "Eugenioides": "https://en.wikipedia.org/wiki/Coffea_eugenioides",
};

const PROCESS_LINKS = {
  "Washed": "https://en.wikipedia.org/wiki/Coffee_processing#Wet_processing",
  "Natural": "https://en.wikipedia.org/wiki/Coffee_processing#Dry_processing",
  "Honey": "https://en.wikipedia.org/wiki/Coffee_processing#Honey_process",
  "Carbonic Maceration": "https://en.wikipedia.org/wiki/Coffee_processing#Carbonic_maceration",
};

// Producer official websites (verified via web search)
const PRODUCER_LINKS = {
  "Finca Deborah": "https://www.fincadeborah.com/",
  "Hacienda La Esmeralda": "https://haciendaesmeralda.com/",
  "Savage Coffees": "https://savagecoffees.co/",
  "Gesha Village Estate": "https://www.geshavillage.com/",
  "Gesha Village Coffee Estate": "https://www.geshavillage.com/",
  "Los Nogales": "https://www.nogales.co/",
  "Finca El Injerto": "https://fincaelinjerto.com/",
  "Elida Estate": "https://lamastusfamilyestates.com/",
  "Daterra": "https://daterracoffee.com.br/",
  "La Palma Y El Tucán": "https://www.lapalmayeltucan.com/",
  "La Palma y el Tucán": "https://www.lapalmayeltucan.com/",
  "Cafe Granja La Esperanza": "https://cafegranjalaesperanza.com/",
  "Inmaculada farms": "https://www.inmaculadacoffeefarms.com/",
  "Inmaculada Farms": "https://www.inmaculadacoffeefarms.com/",
  "Janson Coffee": "https://jansoncoffee.com/",
  "Janson Family": "https://jansoncoffee.com/",
  "Longboard": "https://longboardcoffees.com/",
  "Ninety Plus": "https://www.ninetypluscoffee.com/",
  "Qima Coffee": "https://www.qimacoffee.com/",
  "Qima Cafe": "https://www.qimacoffee.com/",
  "Jairo Arcila": "https://www.cofinet.com.au/jairo-arcila/",
  "Jairo Arcila, Finca Santa Mónica": "https://www.cofinet.com.au/jairo-arcila/",
  "Jairo Arcila, Finca Santa Monica": "https://www.cofinet.com.au/jairo-arcila/",
  "Ninety Plus Coffee": "https://www.ninetypluscoffee.com/",
  "Joseph Brodsky": "https://www.ninetypluscoffee.com/",
  "Aguirre Family": "https://fincaelinjerto.com/",
  "Herrera Family": "https://cafegranjalaesperanza.com/",
  "Mokhtar Alkhanshali": "https://portofmokha.com/",
  "Adam Overton & Rachel Samuel": "https://www.geshavillage.com/",
  "Ben & Kristy Carlson": "https://longmilescoffee.com/",
  // Competition profiles (ACE, CoE, etc.)
  "Benjamin Paz": "https://allianceforcoffeeexcellence.org/legends/",
  "Juan Diego De La Cerda": "https://allianceforcoffeeexcellence.org/team/diego-de-la-cerda/",
  "Juan Diego": "https://allianceforcoffeeexcellence.org/team/diego-de-la-cerda/",
  "Ernesto Menéndez": "https://allianceforcoffeeexcellence.org/legends/",
  "Ernesto Menendez": "https://allianceforcoffeeexcellence.org/legends/",
  "Diego Bermudez": "https://allianceforcoffeeexcellence.org/directory/89-76-4/",
  "Edinson Argote": "https://cupofexcellence.org/directory/87-41-5/",
  "Tamiru Tadesse Tesema": "https://alo-coffee.com/about/",
  "Tamiru Tadesse": "https://alo-coffee.com/about/",
  "Jhoan Vergara": "https://typica.coffee/en/narratives/producers/las-flores/",
  "Pepe Jijón": "https://magazine.coffee/blog/1/6738/meet-the-coffee-producer-pepe-jijon-of-finca-soledad-ecuador",
  "Pepe Jijon": "https://magazine.coffee/blog/1/6738/meet-the-coffee-producer-pepe-jijon-of-finca-soledad-ecuador",
};

function linkVariety(v) {
  const url = VARIETY_LINKS[v];
  return url ? `<a href="${url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent-light)">${esc(v)}</a>` : esc(v);
}

function linkProcess(p) {
  if (!p) return "";
  // Exact match only — no partial matching to avoid overly generic links
  const url = PROCESS_LINKS[p];
  return url ? `<a href="${url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent-light)">${esc(p)}</a>` : esc(p);
}

function linkProducer(name) {
  if (!name) return "";
  // Check for exact or partial match in known producers
  let url = PRODUCER_LINKS[name];
  if (!url) {
    for (const [key, val] of Object.entries(PRODUCER_LINKS)) {
      if (name.includes(key) || key.includes(name)) { url = val; break; }
    }
  }
  if (url) {
    return `<a href="${url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent-light)">${esc(name)}</a>`;
  }
  // Fallback: Google search
  const q = encodeURIComponent(name + " coffee producer");
  return `<a href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--text-muted)">${esc(name)}</a>`;
}

/* ---------- State ---------- */
let allProducts = [];
let filtered = [];
let searchIndex = null;  // Lunr index
let sortCol = "roaster_name";
let sortDir = 1;
let selectedIdx = -1;

/* ---------- Helpers ---------- */
function gramsToOz(g) { return g / 28.3495; }

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function priceWithSize(priceNum, weightLabel) {
  if (!priceNum) return "";
  const p = `$${priceNum.toFixed(2)}`;
  return weightLabel ? `${p} / ${weightLabel}` : p;
}

/* ---------- Data loading ---------- */
fetch("roasted-data.json")
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data => {
    allProducts = data
      .filter(p => p.is_coffee_product)
      .map((p, i) => {
        const price_num = parseFloat(p.price) || 0;
        const ppo = (price_num && p.weight_grams) ? price_num / gramsToOz(p.weight_grams) : 0;
        const sample_price_num = parseFloat(p.sample_price) || 0;
        return {
          ...p,
          _idx: i,
          variety_str: (p.variety || []).join(", "),
          tasting_str: (p.tasting_notes || []).join(", "),
          price_num,
          price_per_oz: ppo,
          price_per_oz_str: ppo ? `$${ppo.toFixed(2)}` : "",
          sample_price_num,
          sample_display: sample_price_num
            ? `$${sample_price_num.toFixed(2)}${p.sample_label ? ' / ' + p.sample_label : ''}`
            : "",
        };
      });

    // Build Lunr search index
    searchIndex = lunr(function() {
      this.field('title', { boost: 3 });
      this.field('producer_or_farm', { boost: 2 });
      this.field('origin_country');
      this.field('variety_str');
      this.field('process');
      this.field('tasting_str');
      this.field('roaster_name');
      this.field('origin_region');
      this.field('watchlist_match');
      this.field('watchlist_credential_detail');
      this.ref('_idx');
      allProducts.forEach(p => { this.add(p); });
    });

    filtered = [...allProducts];
    document.getElementById("loading").style.display = "none";
    buildFilters();
    buildTableHead();
    sortAndRender();
  })
  .catch(err => {
    document.getElementById("loading").textContent = "Failed to load data: " + err.message;
  });

/* ---------- Filters ---------- */
function buildFilters() {
  const roasters = [...new Set(allProducts.map(p => p.roaster_name))].sort();
  const countries = [...new Set(allProducts.map(p => p.origin_country).filter(Boolean))].sort();
  const tiers = [...new Set(allProducts.map(p => p.watchlist_tier).filter(Boolean))].sort(
    (a, b) => (TIER_ORDER[a] ?? 99) - (TIER_ORDER[b] ?? 99)
  );

  populateSelect("filter-roaster", roasters);
  populateSelect("filter-country", countries);
  populateSelect("filter-tier", tiers);
}

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const q = document.getElementById("search").value.trim();
  const roaster = document.getElementById("filter-roaster").value;
  const country = document.getElementById("filter-country").value;
  const tier = document.getElementById("filter-tier").value;

  // Start with Lunr search or all products
  let pool;
  if (q && searchIndex) {
    try {
      // Stemmed search (handles blueberry→blueberries) + wildcard (partial matches)
      // Union both because wildcards bypass Lunr's stemmer
      const stemmed = searchIndex.search(q);
      const wildcard = searchIndex.search(q + '*');
      const idxSet = new Set([...stemmed, ...wildcard].map(r => parseInt(r.ref)));
      pool = allProducts.filter(p => idxSet.has(p._idx));
    } catch {
      // If Lunr query syntax error, fall back to substring
      const ql = q.toLowerCase();
      pool = allProducts.filter(p => {
        const corpus = [
          p.title, p.roaster_name, p.producer_or_farm, p.origin_country,
          p.origin_region, p.process, p.variety_str, p.tasting_str,
          p.watchlist_match, p.watchlist_tier, p.watchlist_credential_detail,
        ].filter(Boolean).join(" ").toLowerCase();
        return corpus.includes(ql);
      });
    }
  } else {
    pool = allProducts;
  }

  // Apply dropdown filters
  filtered = pool.filter(p => {
    if (roaster && p.roaster_name !== roaster) return false;
    if (country && p.origin_country !== country) return false;
    if (tier && p.watchlist_tier !== tier) return false;
    return true;
  });

  selectedIdx = -1;
  sortAndRender();
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filter-roaster").addEventListener("change", applyFilters);
document.getElementById("filter-country").addEventListener("change", applyFilters);
document.getElementById("filter-tier").addEventListener("change", applyFilters);

/* ---------- Tier badge ---------- */
function tierBadgeClass(tier) {
  if (!tier) return "";
  const t = tier.toLowerCase();
  if (t === "legend") return "tier-legend";
  if (t.includes("coe legend")) return "tier-coe-legend";
  if (t.includes("wbc")) return "tier-wbc";
  if (t.includes("coe") || t.includes("bop")) return "tier-coe";
  if (t.includes("elite")) return "tier-elite";
  return "tier-default";
}

function tierBadgeHTML(tier) {
  if (!tier) return "";
  return `<span class="tier-badge ${tierBadgeClass(tier)}">${esc(tier)}</span>`;
}

/* ---------- Watchlist section ---------- */
function renderWatchlist() {
  const watchlistProducts = filtered.filter(p => p.watchlist_match);
  const section = document.getElementById("watchlist-section");
  const grid = document.getElementById("watchlist-grid");
  const count = document.getElementById("watchlist-count");

  if (watchlistProducts.length === 0) { section.style.display = "none"; return; }

  section.style.display = "block";
  count.textContent = `(${watchlistProducts.length} products)`;

  // Sort: available first, then by tier, then by name
  watchlistProducts.sort((a, b) => {
    const aa = a.is_available === false ? 1 : 0;
    const ab = b.is_available === false ? 1 : 0;
    if (aa !== ab) return aa - ab;
    const ta = TIER_ORDER[a.watchlist_tier] ?? 99;
    const tb = TIER_ORDER[b.watchlist_tier] ?? 99;
    if (ta !== tb) return ta - tb;
    return a.title.localeCompare(b.title);
  });

  grid.innerHTML = watchlistProducts.map(p => {
    const producer = p.watchlist_match || p.producer_or_farm || "";
    const meta = [p.origin_country, p.process, p.variety_str].filter(Boolean);
    const priceStr = priceWithSize(p.price_num, p.weight_label);
    const perOz = p.price_per_oz_str;
    const accolade = p.watchlist_credential_detail || "";
    const unavailClass = p.is_available === false ? " unavailable" : "";
    const soldOutBadge = p.is_available === false ? '<span class="sold-out-badge">Sold Out</span>' : "";
    const imgTag = p.image_url
      ? `<img class="wc-img" src="${esc(p.image_url)}" alt="" loading="lazy">`
      : `<div class="wc-img"></div>`;

    return `
      <div class="watchlist-card${unavailClass}" onclick="toggleWatchlistDetail(this, '${esc(p.product_url)}')">
        ${imgTag}
        <div class="wc-body">
          <div class="wc-top">
            <h3>${esc(p.title)}${soldOutBadge}</h3>
            <div class="wc-price-block">
              ${priceStr ? `<div class="wc-price">${esc(priceStr)}</div>` : ""}
              ${perOz ? `<div class="wc-peroz">${perOz}/oz</div>` : ""}
              ${p.sample_display ? `<div class="wc-sample">Sample: ${esc(p.sample_display)}</div>` : ""}
            </div>
          </div>
          <div class="wc-mid">
            <span class="roaster-badge">${esc(p.roaster_name)}</span>
            ${tierBadgeHTML(p.watchlist_tier)}
          </div>
          <div class="wc-producer">${esc(producer)}</div>
          ${accolade ? `<div class="wc-accolade">${esc(accolade)}</div>` : ""}
          <div class="wc-meta">${meta.map(m => `<span>${esc(m)}</span>`).join("")}</div>
        </div>
      </div>`;
  }).join("");
}

/* ---------- Table ---------- */
function buildTableHead() {
  const tr = document.getElementById("table-head");
  tr.innerHTML = "";
  TABLE_COLS.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label;
    th.dataset.key = col.key;
    if (col.key === sortCol) {
      th.innerHTML += `<span class="sort-arrow">${sortDir > 0 ? "\u25B2" : "\u25BC"}</span>`;
    }
    th.addEventListener("click", () => {
      if (sortCol === col.key) { sortDir *= -1; }
      else { sortCol = col.key; sortDir = (col.key === "price" || col.key === "price_per_oz" || col.key === "sample") ? -1 : 1; }
      sortAndRender();
    });
    tr.appendChild(th);
  });
}

function sortVal(c, key) {
  if (key === "price") return c.price_num || 0;
  if (key === "price_per_oz") return c.price_per_oz || 0;
  if (key === "sample") return c.sample_price_num || 0;
  const v = c[key] || "";
  return typeof v === "string" ? v.toLowerCase() : v;
}

function sortAndRender() {
  // Sort: unavailable products always at bottom, then by chosen column
  filtered.sort((a, b) => {
    const aa = a.is_available === false ? 1 : 0;
    const ab = b.is_available === false ? 1 : 0;
    if (aa !== ab) return aa - ab;
    const va = sortVal(a, sortCol);
    const vb = sortVal(b, sortCol);
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
  renderWatchlist();
  renderTable();
  buildTableHead();

  const matchCount = filtered.filter(p => p.watchlist_match).length;
  document.getElementById("stats").textContent =
    `${filtered.length} coffees` + (matchCount ? ` (${matchCount} watchlist)` : "");
  document.getElementById("table-section").style.display = "block";
}

function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  filtered.forEach((c, i) => {
    const tr = document.createElement("tr");
    if (i === selectedIdx) tr.classList.add("selected");
    if (c.watchlist_match) tr.classList.add("watchlist-row");
    if (c.is_available === false) tr.classList.add("unavailable");
    TABLE_COLS.forEach(col => {
      const td = document.createElement("td");
      if (col.img && c.image_url) {
        const img = document.createElement("img");
        img.className = "tbl-img"; img.src = c.image_url; img.alt = ""; img.loading = "lazy";
        td.appendChild(img);
        const nameText = c[col.key] || "";
        td.appendChild(document.createTextNode(nameText));
        if (c.is_available === false) {
          const badge = document.createElement("span");
          badge.className = "sold-out-badge";
          badge.textContent = "Sold Out";
          td.appendChild(badge);
        }
      } else if (col.key === "price") {
        td.textContent = priceWithSize(c.price_num, c.weight_label);
      } else if (col.key === "price_per_oz") {
        td.textContent = c.price_per_oz_str;
      } else if (col.key === "sample") {
        td.textContent = c.sample_display;
      } else {
        td.textContent = c[col.key] || "";
      }
      if (col.wrap) td.classList.add("wrap");
      tr.appendChild(td);
    });
    tr.addEventListener("click", () => showDetail(i));
    tbody.appendChild(tr);

    // Inline detail row
    if (i === selectedIdx) {
      const detailTr = document.createElement("tr");
      detailTr.className = "detail-row";
      const detailTd = document.createElement("td");
      detailTd.colSpan = TABLE_COLS.length;
      detailTd.innerHTML = buildDetailHTML(c);
      detailTr.appendChild(detailTd);
      tbody.appendChild(detailTr);
    }
  });
}

/* ---------- Inline detail ---------- */
function showDetail(idx) {
  selectedIdx = selectedIdx === idx ? -1 : idx;  // toggle
  renderTable();
  buildTableHead();
}

function showDetailByUrl(url) {
  const idx = filtered.findIndex(p => p.product_url === url);
  if (idx >= 0) showDetail(idx);
}

function toggleWatchlistDetail(cardEl, url) {
  const existing = cardEl.querySelector('.wc-detail');
  if (existing) {
    existing.remove();
    cardEl.classList.remove('expanded');
    return;
  }
  // Close any other open watchlist details
  document.querySelectorAll('.wc-detail').forEach(el => el.remove());
  document.querySelectorAll('.watchlist-card.expanded').forEach(el => el.classList.remove('expanded'));
  const p = allProducts.find(p => p.product_url === url);
  if (!p) return;
  // Move cards that were before this one in the same row to after it,
  // so the expanded card is first on its row and everything else flows below
  const grid = cardEl.parentElement;
  const cols = Math.max(1, Math.floor(grid.offsetWidth / 340));
  const cards = [...grid.querySelectorAll('.watchlist-card')];
  const idx = cards.indexOf(cardEl);
  const rowStart = Math.floor(idx / cols) * cols;
  // Move earlier same-row cards to just after the expanded card
  for (let i = rowStart; i < idx; i++) {
    cardEl.after(cards[i]);
  }
  cardEl.classList.add('expanded');
  const div = document.createElement('div');
  div.className = 'wc-detail';
  div.innerHTML = buildDetailHTML(p);
  div.addEventListener('click', e => e.stopPropagation());
  cardEl.appendChild(div);
}

function buildDetailHTML(c) {
  const sizeStr = c.weight_label || (c.weight_grams ? `${c.weight_grams}g` : "");
  const availStr = c.is_available === false ? "Sold Out" : "In Stock";
  const sampleStr = c.sample_display || "";

  let accolade = "";
  if (c.watchlist_credential_type || c.watchlist_credential_detail) {
    if (c.watchlist_credential_type) accolade += `<strong>${esc(c.watchlist_credential_type)}</strong>: `;
    if (c.watchlist_credential_detail) accolade += esc(c.watchlist_credential_detail);
  }
  if (c.watchlist_notes) {
    if (accolade) accolade += "<br>";
    accolade += esc(c.watchlist_notes);
  }

  // Build linked values for producer, variety, process
  const producerHtml = c.producer_or_farm ? linkProducer(c.producer_or_farm) : "";
  const varietyHtml = (c.variety || []).map(v => linkVariety(v)).join(", ");
  const processHtml = c.process ? linkProcess(c.process) : "";

  const specs = [
    { label: "Roaster", value: esc(c.roaster_name) },
    { label: "Price", value: esc(priceWithSize(c.price_num, sizeStr)) },
    { label: "$/oz", value: esc(c.price_per_oz_str) },
    { label: "Sample", value: esc(sampleStr) },
    { label: "Availability", value: esc(availStr) },
    { label: "Producer", value: producerHtml, raw: true },
    { label: "Country", value: esc(c.origin_country) },
    { label: "Region", value: esc(c.origin_region) },
    { label: "Process", value: processHtml, raw: true },
    { label: "Variety", value: varietyHtml, raw: true },
    { label: "Elevation", value: esc(c.elevation) },
    { label: "Watchlist", value: esc(c.watchlist_match) },
    { label: "Tier", value: esc(c.watchlist_tier) },
  ].filter(s => s.value);

  const specsHtml = specs
    .map(s => `<div class="spec-item"><span class="spec-label">${s.label}:</span><span class="spec-value">${s.value}</span></div>`)
    .join("");

  const notesHtml = c.tasting_str
    ? `<div class="notes-section"><h3>Tasting Notes</h3><p>${esc(c.tasting_str)}</p></div>`
    : "";

  const imgHtml = c.image_url
    ? `<img class="detail-img" src="${esc(c.image_url)}" alt="" loading="lazy">`
    : "";

  return `<div class="detail-inner">
    <div class="detail-top">
      ${imgHtml}
      <div class="detail-header">
        <h3>${esc(c.title)}</h3>
        <a href="${esc(c.product_url)}" target="_blank" rel="noopener">View on ${esc(c.roaster_name)} \u2192</a>
        ${accolade ? `<div class="detail-accolade">${accolade}</div>` : ""}
      </div>
    </div>
    <div class="detail-specs">${specsHtml}</div>
    ${notesHtml}
  </div>`;
}
</script>
</body>
