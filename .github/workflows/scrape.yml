name: Scrape Roasted Coffee

on:
  schedule:
    - cron: '0 8 * * 0'  # Sunday 1am PT (8am UTC)
  workflow_dispatch:

permissions:
  contents: write

env:
  GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
  VERTEX_AI_LOCATION: global
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # fallback if not using Vertex AI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python -m scraper.scrape

      - name: Auto-commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/roasted-data.json data/llm_cache.json data/match_cache.json
          git diff --cached --quiet || git commit -m "Update roasted coffee data [bot]"
          git push
